spring.datasource.url=jdbc:h2:mem:parque_integration;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.h2.console.enabled=false
app.demo-data.enabled=true
app.demo-admin.username=${APP_DEMO_ADMIN_USERNAME:admin}
app.demo-admin.email=${APP_DEMO_ADMIN_EMAIL:admin@parque.local}
app.demo-admin.password=${APP_DEMO_ADMIN_PASSWORD:admin12345}
