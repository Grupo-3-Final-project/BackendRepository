spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/parque_atracciones?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:parque_user}
spring.datasource.password=${DB_PASSWORD:parque_password}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.flyway.baseline-on-migrate=true
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
app.demo-admin.username=${APP_DEMO_ADMIN_USERNAME:admin}
app.demo-admin.email=${APP_DEMO_ADMIN_EMAIL:admin@parque.local}
app.demo-admin.password=${APP_DEMO_ADMIN_PASSWORD:admin12345}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@parque.local}
spring.mail.password=${MAIL_PASSWORD:password123}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
