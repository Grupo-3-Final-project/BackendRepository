spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/parque_atracciones?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:parque_user}
spring.datasource.password=${DB_PASSWORD:parque_password}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.flyway.baseline-on-migrate=true
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
app.demo-admin.username=${APP_DEMO_ADMIN_USERNAME:admin}
app.demo-admin.email=${APP_DEMO_ADMIN_EMAIL:admin@parque.local}
app.demo-admin.password=${APP_DEMO_ADMIN_PASSWORD:admin12345}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:${MAIL_USERNAME:}}
spring.mail.password=${MAIL_PASS:${MAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:localhost}
app.mail.from=${APP_MAIL_FROM:no-reply@parque.local}
app.urls.base-mobile=${APP_URLS_BASE_MOBILE:http://localhost:5173}
app.urls.base-entry=${APP_URLS_BASE_ENTRY:http://localhost:5173}
