spring.application.name=backend-repository
spring.profiles.default=dev
server.port=${SERVER_PORT:8080}
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.clean-disabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:${MAIL_USERNAME:}}
spring.mail.password=${MAIL_PASS:${MAIL_PASSWORD:}}
app.mail.from=${APP_MAIL_FROM:${spring.mail.username:}}
app.urls.base-mobile=${APP_URLS_BASE_MOBILE:http://localhost:5173}
app.urls.base-entry=${APP_URLS_BASE_ENTRY:http://localhost:5173}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:}}

# ============================================
# MAIL - SMTP Gmail
# Las credenciales se cargan desde .env
# ============================================
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Identidad del remitente
app.mail.from-name=La Ultima Puerta

# Thymeleaf (templates de email)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
